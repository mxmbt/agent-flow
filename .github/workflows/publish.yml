name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: Package version to publish, for example 0.1.0
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: npm ci

      - name: Verify requested version
        run: |
          actual="$(node -p "require('./package.json').version")"
          if [ "$actual" != "${{ inputs.version }}" ]; then
            echo "Requested version ${{ inputs.version }} does not match package.json version $actual" >&2
            exit 1
          fi

      - name: Test
        run: npm test

      - name: Package smoke
        run: npm run smoke:package

      - name: Check package contents
        run: npm pack --dry-run --json

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

